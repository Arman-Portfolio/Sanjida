<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    overflow:hidden;
}

.container{
    width:90%;
    max-width:360px;
    text-align:center;
}

.teddy{
    font-size:80px;
    animation:bounce 1.5s infinite;
}

@keyframes bounce{
50%{
transform:translateY(-10px);
}
}

h1{
    color:#ff4f81;
    margin:25px 0;
    line-height:1.4;
    font-size:1.6rem;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 28px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.yes{
    background:#ff4f81;
    color:white;
}

.no{
    background:white;
    color:#555;
}

.heart{
    position:absolute;
    animation:float 5s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>
</head>
<body>

<div class="container">

<div class="teddy">🧸</div>

<h1 id="question"></h1>

<div id="buttons"></div>

</div>

<script>

let path="";
let current=0;

const questions = {

"": "🎉 Party nehi degi? 😏",

"Y": "Sirf mithai deke kaam chal jayega? 🍬",
"N": "BF ko party degi aur mujhe nahi? 😭",

"YY": "Sach me sirf mithai? 🤨",
"YN": "Mujhe ignore karne ka plan hai kya? 😆",
"NY": "BF ke saath party aur mere liye kuch bhi nahi? 😒",
"NN": "Itna bhi kya bhedbhaav? 😂"

};

const extraQuestions = [

"🍕 Ek plate Biriyani treat milega na? 😋",
"🍔 Ek burger bhi khilayegi na? 🥺",
"🍜 Ek plate momo/chowmein bhi pakka? 😆",
"🍰 Aur last me ek KFC treat bhi? ❤️"

];


function render(){

const q=document.getElementById("question");
const b=document.getElementById("buttons");

if(path.length<3){

q.innerHTML=questions[path];

b.innerHTML=`
<button class="yes" onclick="choose('Y')">Yes ❤️</button>
<button class="no" onclick="choose('N')">No 😆</button>
`;

}else{

current=0;
nextQuestion();

}

}

function choose(choice){

path+=choice;
render();

}

function nextQuestion(){

const q=document.getElementById("question");
const b=document.getElementById("buttons");

if(current<extraQuestions.length){

q.innerHTML=extraQuestions[current];

b.innerHTML=`
<button class="yes" onclick="nextQuestion()">Yes ❤️</button>
`;

current++;

}else{


q.innerHTML = `
❤️ Mission Successful ❤️<br><br>

After so many questions, we've finally reached an agreement 😆🧸<br><br>

Now remember... 😌<br><br>

🍕 Biriyani ✔️<br>
🍔 Burger ✔️<br>
🍜 Momo/Chowmein ✔️<br>
🍰 KFC ✔️<br><br>

Promise is a promise 🤝❤️<br><br>

See you at the treat! 😋✨
`;

b.innerHTML = "";

setInterval(createHeart,300);

}

}

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

}

render();

</script>

</body>
</html>
